services:
  mysql:
    image: mysql:8.4
    container_name: oauth-oidc-login-mysql
    environment:
      MYSQL_DATABASE: oauthlogin
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - oauth-oidc-login-mysql-data:/var/lib/mysql
volumes:
  oauth-oidc-login-mysql-data:
